groups:
  - name: cities-observability
    interval: 15s
    rules:
      - record: sws:cities:http_requests:rate5m
        expr: sum by (job) (rate(http_server_request_duration_seconds_count{job=~"citiesservice|citiesgrpcservice"}[5m]))

      - record: sws:cities:http_5xx:rate5m
        expr: |
          sum by (job) (rate(http_server_request_duration_seconds_count{job=~"citiesservice|citiesgrpcservice", http_response_status_code=~"5.."}[5m]))
          or
          sum by (job) (rate(http_server_request_duration_seconds_count{job=~"citiesservice|citiesgrpcservice", http_status_code=~"5.."}[5m]))

      - record: sws:cities:http_duration:p95_5m
        expr: histogram_quantile(0.95, sum by (le, job) (rate(http_server_request_duration_seconds_bucket{job=~"citiesservice|citiesgrpcservice"}[5m])))

      - record: sws:cities:mediator_duration:p95_5m
        expr: histogram_quantile(0.95, sum by (le, operation) (rate(sws_cities_mediator_request_duration_seconds_bucket[5m])))

      - record: sws:cities:grpc_duration:p95_5m
        expr: histogram_quantile(0.95, sum by (le, grpc_method) (rate(sws_cities_grpc_call_duration_seconds_bucket[5m])))

      - record: sws:cities:cache_miss:ratio5m
        expr: |
          sum by (operation) (rate(sws_cities_cache_requests_total{cache_result="miss"}[5m]))
          /
          sum by (operation) (rate(sws_cities_cache_requests_total[5m]))

      - alert: CitiesScrapeTargetDown
        expr: up{job=~"citiesservice|citiesgrpcservice"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Cities scrape target is down"
          description: "{{ $labels.job }} has been unreachable for at least 2 minutes."

      - alert: CitiesHttp5xxErrors
        expr: sws:cities:http_5xx:rate5m > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cities HTTP 5xx responses detected"
          description: "{{ $labels.job }} has returned HTTP 5xx responses for at least 5 minutes."

      - alert: CitiesHttpP95High
        expr: sws:cities:http_duration:p95_5m > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cities HTTP p95 latency is high"
          description: "{{ $labels.job }} HTTP p95 latency has been above 1 second for at least 5 minutes."

      - alert: CitiesGrpcExceptions
        expr: sum by (grpc_method) (rate(sws_cities_grpc_calls_total{result="exception"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cities gRPC exceptions detected"
          description: "{{ $labels.grpc_method }} has recorded exception results for at least 5 minutes."

      - alert: CitiesCacheMissRatioHigh
        expr: |
          sws:cities:cache_miss:ratio5m > 0.8
          and
          sum by (operation) (rate(sws_cities_cache_requests_total[5m])) > 0
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Cities cache miss ratio is high"
          description: "{{ $labels.operation }} cache miss ratio has been above 80% for at least 10 minutes."
