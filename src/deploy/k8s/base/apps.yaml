apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauthserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauthserver
  template:
    metadata:
      labels:
        app: oauthserver
    spec:
      containers:
        - name: oauthserver
          image: oauthserver:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sws-app-config
            - secretRef:
                name: sws-app-secrets
          ports:
            - containerPort: 80
              name: http
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: oauthserver
spec:
  selector:
    app: oauthserver
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: citiesservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: citiesservice
  template:
    metadata:
      labels:
        app: citiesservice
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres:5432"
                sleep 2
              done
      containers:
        - name: citiesservice
          image: citiesservice:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sws-app-config
            - secretRef:
                name: sws-app-secrets
          ports:
            - containerPort: 80
              name: http
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: citiesservice
spec:
  selector:
    app: citiesservice
  ports:
    - name: http
      port: 80
      targetPort: 80
---
