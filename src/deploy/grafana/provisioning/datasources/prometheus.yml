apiVersion: 1

datasources:
  - name: Prometheus
    uid: sws-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    uid: sws-loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - name: Trace
          matcherRegex: '"trace_id":"([0-9a-fA-F]+)"'
          datasourceUid: sws-jaeger
          url: '$${__value.raw}'
    editable: true

  - name: Jaeger
    uid: sws-jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
