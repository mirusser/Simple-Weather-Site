services:
  postgres:
    image: postgres:latest
    container_name: postgres_infra
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.infra}"
      POSTGRES_DB: postgres
    volumes:
      - /opt/sws/volumes/postgresql:/var/lib/postgresql
    expose:
      - "5432"
    networks:
      - default

  mongo:
    image: mongo:latest
    container_name: mongo_infra
    restart: unless-stopped
    volumes:
      - /opt/sws/volumes/mongo/data/db:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    expose:
      - "27017"
    networks:
      - default

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_infra
    restart: unless-stopped
    user: root
    environment:
      - ACCEPT_EULA=Y
      - "MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env.infra}"
    volumes:
      - /opt/sws/volumes/mssql/data:/var/opt/mssql
    expose:
      - "1433"
    networks:
      - default

  redis:
    image: redis:latest
    container_name: redis_infra
    restart: unless-stopped
    user: "0:0"
    volumes:
      - /opt/sws/volumes/redis/data:/data
    command: redis-server --dir /data --appendonly yes
    expose:
      - "6379"
    networks:
      - default

  seq:
    image: datalust/seq:latest
    container_name: seq_infra
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    volumes:
      - /opt/sws/volumes/seq/data:/data
    expose:
      - "80"
    networks:
      - default

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: prometheus_infra
    restart: unless-stopped
    user: "0:0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-otlp-receiver"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/sws/volumes/prometheus/data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    expose:
      - "9090"
    networks:
      - default

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana_infra
    restart: unless-stopped
    user: "0:0"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - "GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env.infra}"
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - /opt/sws/volumes/grafana/data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    expose:
      - "3000"
    networks:
      - default
    depends_on:
      - jaeger
      - loki
      - prometheus

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    container_name: jaeger_infra
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "127.0.0.1:16686:16686"
    expose:
      - "4318"
      - "16686"
    networks:
      - default

  loki:
    image: grafana/loki:3.7.0
    container_name: loki_infra
    restart: unless-stopped
    user: "0:0"
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - /opt/sws/volumes/loki/data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    expose:
      - "3100"
    networks:
      - default

  alloy:
    image: grafana/alloy:v1.15.0
    container_name: alloy_infra
    restart: unless-stopped
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "/etc/alloy/config.alloy"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:12345:12345"
    expose:
      - "12345"
    networks:
      - default
    depends_on:
      - loki

  rabbitmq:
    image: heidiks/rabbitmq-delayed-message-exchange:latest
    container_name: rabbitmq_infra
    restart: unless-stopped
    volumes:
      - /opt/sws/volumes/rabbitmq/data:/var/lib/rabbitmq
    expose:
      - "5672"
      - "15672"
    networks:
      - default

  healthchecks:
    image: xabarilcoding/healthchecksui:latest
    container_name: healthchecks_infra
    restart: unless-stopped
    depends_on:
      - sqlserver
    environment:
      - ui_path=/
      - storage_provider=SqlServer
      - "storage_connection=Server=sqlserver;User Id=sa;Password=${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env.infra};Initial Catalog=DockerUI"
      - 'HealthChecksUI:HealthChecks:0:Name=OAuthServer'
      - 'HealthChecksUI:HealthChecks:0:Uri=http://oauthserver:80/health'
      - 'HealthChecksUI:HealthChecks:1:Name=CitiesService'
      - 'HealthChecksUI:HealthChecks:1:Uri=http://citiesservice:80/health'
      - 'HealthChecksUI:HealthChecks:2:Name=WeatherService'
      - 'HealthChecksUI:HealthChecks:2:Uri=http://weatherservice:80/health'
      - 'HealthChecksUI:HealthChecks:3:Name=WeatherHistoryService'
      - 'HealthChecksUI:HealthChecks:3:Uri=http://weatherhistoryservice:80/health'
      - 'HealthChecksUI:HealthChecks:4:Name=CitiesGrpcService'
      - 'HealthChecksUI:HealthChecks:4:Uri=http://citiesgrpcservice:80/health'
      - 'HealthChecksUI:HealthChecks:5:Name=EmailService'
      - 'HealthChecksUI:HealthChecks:5:Uri=http://emailservice:80/health'
      - 'HealthChecksUI:HealthChecks:6:Name=IconService'
      - 'HealthChecksUI:HealthChecks:6:Uri=http://iconservice:80/health'
      - 'HealthChecksUI:HealthChecks:7:Name=SignalRServer'
      - 'HealthChecksUI:HealthChecks:7:Uri=http://signalrserver:80/health'
      - 'HealthChecksUI:HealthChecks:8:Name=HangfireService'
      - 'HealthChecksUI:HealthChecks:8:Uri=http://hangfireservice:80/health'
      - 'HealthChecksUI:HealthChecks:9:Name=WeatherSite'
      - 'HealthChecksUI:HealthChecks:9:Uri=http://weathersite:80/health'
    expose:
      - "80"
    networks:
      - default

networks:
  default:
    name: sws-containers-bridge-network
    external: true
